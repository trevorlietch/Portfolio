<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose the Different Color</title>
  <style>
    body { margin:0; background:#202020; color:white; font-family:Segoe UI, sans-serif; }
    header {
      background:#111; padding:14px 28px; display:flex; justify-content:space-between; align-items:center;
    }
    h1 { margin:0; font-size:28px; }
    #hud { display:flex; gap:18px; align-items:center; font-weight:700; }
    main { display:flex; justify-content:center; padding:14px 0; background:#f3f3f3; min-height: calc(100vh - 64px); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script src="sketch.js" defer></script>
</head>
<body>
  <header>
    <h1>Choose the Different Color</h1>
    <div id="hud">
      <span id="score">Score: 0</span>
    </div>
  </header>
  <main id="game"></main>
</body>
</html>
